{% if messages %}
<style>
    .messages-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 400px;
        width: calc(100% - 40px);
    }

    .msg {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-radius: 12px;
        padding: 16px 20px;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        line-height: 1.5;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.15);
        position: relative;
        overflow: hidden;
        animation: fadeInSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        opacity: 0;
        transform: translateX(20px);
    }

    .msg::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: currentColor;
        opacity: 0.8;
    }

    .msg::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg, 
            transparent 30%, 
            rgba(255, 255, 255, 0.03) 50%, 
            transparent 70%);
        animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes fadeInSlide {
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    @keyframes shimmer {
        0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
        50% { transform: translate(0%, 0%) rotate(180deg); }
    }

    /* Message type colors */
    .msg.error {
        background: rgba(239, 68, 68, 0.15);
        border-color: rgba(239, 68, 68, 0.3);
        color: #fca5a5;
        box-shadow: 0 8px 32px rgba(239, 68, 68, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .msg.error::before {
        background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
    }

    .msg.success {
        background: rgba(34, 197, 94, 0.15);
        border-color: rgba(34, 197, 94, 0.3);
        color: #86efac;
        box-shadow: 0 8px 32px rgba(34, 197, 94, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .msg.success::before {
        background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
    }

    .msg.warning {
        background: rgba(234, 179, 8, 0.15);
        border-color: rgba(234, 179, 8, 0.3);
        color: #fde047;
        box-shadow: 0 8px 32px rgba(234, 179, 8, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .msg.warning::before {
        background: linear-gradient(180deg, #eab308 0%, #ca8a04 100%);
    }

    .msg.info {
        background: rgba(59, 130, 246, 0.15);
        border-color: rgba(59, 130, 246, 0.3);
        color: #93c5fd;
        box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .msg.info::before {
        background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
    }

    /* Stagger animation for multiple messages */
    .msg:nth-child(1) { animation-delay: 0s; }
    .msg:nth-child(2) { animation-delay: 0.1s; }
    .msg:nth-child(3) { animation-delay: 0.2s; }
    .msg:nth-child(4) { animation-delay: 0.3s; }
    .msg:nth-child(5) { animation-delay: 0.4s; }

    /* Mobile responsive */
    @media (max-width: 640px) {
        .messages-container {
            top: 10px;
            right: 10px;
            left: 10px;
            width: auto;
            max-width: none;
        }

        .msg {
            padding: 14px 16px;
            font-size: 13px;
        }
    }
</style>

<div class="messages-container">
    {% for message in messages %}
        <div class="msg {{ message.tags }}">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}
