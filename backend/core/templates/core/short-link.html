<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Short Link</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background gradient */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 50% 30%, rgba(119, 198, 255, 0.3) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-10%, -10%) rotate(180deg); }
        }

        .glass-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 48px 40px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37),
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(255, 255, 255, 0.05) 50%, 
                transparent 70%);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            50% { transform: translate(0%, 0%) rotate(180deg); }
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 32px;
            text-align: center;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        .success-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(119, 255, 198, 0.2) 0%, rgba(119, 198, 255, 0.2) 100%);
            border-radius: 50%;
            border: 2px solid rgba(119, 255, 198, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(119, 255, 198, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(119, 255, 198, 0); }
        }

        .success-icon svg {
            width: 32px;
            height: 32px;
            stroke: rgba(119, 255, 198, 1);
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .short-link-container {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .short-link-container:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .short-link-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .short-link-url {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(120, 119, 198, 0.5);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn-copy {
            background: linear-gradient(135deg, rgba(120, 119, 198, 0.8) 0%, rgba(255, 119, 198, 0.8) 100%);
            color: #fff;
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(120, 119, 198, 0.4);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-open {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .btn-open:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .original-link {
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .original-link-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }

        .original-link-url {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            word-break: break-all;
            line-height: 1.5;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, rgba(119, 255, 198, 0.95) 0%, rgba(119, 198, 255, 0.95) 100%);
            color: #000;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(119, 255, 198, 0.4);
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive design */
        @media (max-width: 640px) {
            .glass-card {
                padding: 36px 24px;
                border-radius: 20px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 24px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .short-link-url {
                font-size: 16px;
            }

            .toast {
                right: 20px;
                left: 20px;
            }
        }

        @media (max-width: 400px) {
            .glass-card {
                padding: 28px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .success-icon {
                width: 56px;
                height: 56px;
            }
        }

        /* Icon styles */
        .icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="card-content">
            <div class="success-icon">
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <h1>Your Short Link</h1>

            <div class="short-link-container">
                <div class="short-link-label">Short URL</div>
                <div class="short-link-url" id="shortUrl">http://127.0.0.1:8000/{{ link.short }}</div>
            </div>

            <div class="button-group">
                <button class="btn btn-copy" onclick="copyToClipboard()">
                    <svg class="icon" viewBox="0 0 24 24">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span>Copy Link</span>
                </button>
                <button class="btn btn-open" onclick="openLink()">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    <span>Open Link</span>
                </button>
            </div>

            <div class="original-link">
                <div class="original-link-label">Original URL</div>
                <div class="original-link-url">{{ link.link }}</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        ✓ Link copied to clipboard!
    </div>

    <script>
        const shortUrl = document.getElementById('shortUrl').textContent;
        const toast = document.getElementById('toast');

        function copyToClipboard() {
            // Create a temporary textarea element
            const textarea = document.createElement('textarea');
            textarea.value = shortUrl;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            
            // Select and copy the text
            textarea.select();
            textarea.setSelectionRange(0, 99999); // For mobile devices
            
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Failed to copy:', err);
                // Fallback for modern browsers
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(shortUrl).then(() => {
                        showToast();
                    }).catch(err => {
                        console.error('Clipboard API failed:', err);
                    });
                }
            }
            
            document.body.removeChild(textarea);
        }

        function openLink() {
            window.open(shortUrl, '_blank', 'noopener,noreferrer');
        }

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Add keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + C to copy
            if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
                e.preventDefault();
                copyToClipboard();
            }
            // Ctrl/Cmd + O to open
            if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
                e.preventDefault();
                openLink();
            }
        });
    </script>
</body>
</html>
