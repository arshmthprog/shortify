<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background gradient */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, rgba(119, 198, 255, 0.3) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-10%, -10%) rotate(180deg); }
        }

        .messages-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 500px;
        }

        .glass-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37),
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.1), 
                transparent);
            transition: left 0.6s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 48px 0 rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
        }

        .glass-card:hover::before {
            left: 100%;
        }

        h1 {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 32px;
            text-align: center;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        input[type="url"],
        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        input[type="url"]::placeholder,
        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input[type="url"]:focus,
        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        button[type="submit"] {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, rgba(120, 119, 198, 0.8) 0%, rgba(255, 119, 198, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        button[type="submit"]::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(120, 119, 198, 0.4);
            border-color: rgba(255, 255, 255, 0.3);
        }

        button[type="submit"]:hover::before {
            width: 300px;
            height: 300px;
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        button[type="submit"] span {
            position: relative;
            z-index: 1;
        }

        /* Responsive design */
        @media (max-width: 640px) {
            .glass-card {
                padding: 36px 24px;
                border-radius: 20px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 24px;
            }

            input[type="url"],
            input[type="text"],
            button[type="submit"] {
                padding: 14px 18px;
                font-size: 15px;
            }
        }

        @media (max-width: 400px) {
            .glass-card {
                padding: 28px 20px;
            }

            h1 {
                font-size: 24px;
            }
        }

        /* Loading state */
        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Focus visible for accessibility */
        *:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.5);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="messages-container">
        {% include 'core/messages.html' %}
    </div>

    <div class="glass-card">
        <h1>URL Shortener</h1>
        <form method="POST" action="" id="shortenerForm">
            {% csrf_token %}
            <div class="form-group">
                <label for="link">Enter your URL</label>
                <input 
                    type="url" 
                    id="link" 
                    name="link" 
                    placeholder="https://example.com/your-long-url" 
                    required
                    autocomplete="url"
                >
            </div>
            <button type="submit">
                <span>Generate Short Link</span>
            </button>
        </form>
    </div>

    <script>
        // Form submission handling
        const form = document.getElementById('shortenerForm');
        const submitButton = form.querySelector('button[type="submit"]');
        const input = form.querySelector('input[name="link"]');

        form.addEventListener('submit', function(e) {
            // Disable button during submission
            submitButton.disabled = true;
            submitButton.querySelector('span').textContent = 'Generating...';
            
            // Re-enable after a timeout (in case of errors)
            setTimeout(() => {
                submitButton.disabled = false;
                submitButton.querySelector('span').textContent = 'Generate Short Link';
            }, 5000);
        });

        // Input validation feedback
        input.addEventListener('input', function() {
            if (this.validity.valid) {
                this.style.borderColor = 'rgba(119, 255, 198, 0.3)';
            } else if (this.value.length > 0) {
                this.style.borderColor = 'rgba(255, 119, 119, 0.3)';
            } else {
                this.style.borderColor = 'rgba(255, 255, 255, 0.15)';
            }
        });

        // Auto-focus input on page load
        window.addEventListener('load', () => {
            input.focus();
        });
    </script>
</body>
</html>
